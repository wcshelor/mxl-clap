  known_limits: Uses a single representative pitch per event and can miss inner-voice or accompaniment chromaticism.

experimental__chromaticism__pitch_class_entropy:
  <<: *chromaticism_defaults
  name: experimental__chromaticism__pitch_class_entropy
  description: Experimental proxy for pitch class entropy.
  musicological_claim: May reflect a broader spread of pitch classes.
  known_limits: Pitch-class entropy is a coarse distribution proxy and does not distinguish function from ornament.

experimental__chromaticism__non_diatonic_pitch_class_count:
  <<: *chromaticism_defaults
  name: experimental__chromaticism__non_diatonic_pitch_class_count
  description: Experimental proxy for non-diatonic pitch class count.
